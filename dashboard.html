<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Student Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body onload="loadDashboard()">
<div class="sidebar">
<h2>CITS</h2>
<a class="active"><i class="fa fa-home"></i> Dashboard</a>
<a href="#"><i class="fa fa-plus-circle"></i> New Complaint</a>
<a href="#"><i class="fa fa-list"></i> My Complaints</a>
<a href="#"><i class="fa fa-user"></i> Profile</a>
<a href="#" onclick="logout()"><i class="fa fa-right-from-bracket"></i> Logout</a>
</div>

<div class="main">
<div class="topbar">
<h2>Complaint & Issue Tracking System</h2>
<div class="user">👋 Welcome, <span id="studentName">Student</span></div>
</div>

<div class="banner">
<h1>Raise Your Complaint Easily</h1>
<p>Track every issue from one dashboard.</p>
<button>+ Raise New Complaint</button>
</div>

<div class="cards">
<div class="card"><h3>Total</h3><h1 id="total">0</h1></div>
<div class="card"><h3>Pending</h3><h1 id="pending">0</h1></div>
<div class="card"><h3>In Progress</h3><h1 id="progress">0</h1></div>
<div class="card"><h3>Resolved</h3><h1 id="resolved">0</h1></div>
</div>

<div class="table-box">
<h2>Recent Complaints</h2>
<table>
<thead>
<tr><th>Ticket</th><th>Category</th><th>Status</th></tr>
</thead>
<tbody id="complaintBody">
<tr><td colspan="3">No complaints found.</td></tr>
</tbody>
</table>
</div>
</div>
<script src="dashboard.js"></script>
</body>
</html>
