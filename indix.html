<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>


    <div class="container">
        <div class="left">
            <h1>Complaint & Issue<br><span>Tracking System</span></h1>
            <p>Raise your concern, we'll take care and keep you updated.</p>
            <div class="features">
                <div>✔ Easy to Report</div>
                <div>✔ Track Status</div>
                <div>✔ Get Updates</div>
            </div>
        </div>

        <div class="right">
            <div class="card">
                <div class="icon"><i class="fa-solid fa-user-graduate"></i></div>
                <h2>Student Login</h2>
                <p>Login using your Roll Number and Password</p>

                <label>Mobile Number</label>
                <div class="input-box">
                    <i class="fa fa-id-card"></i>
                    <input type="text" id="roll" placeholder="Enter Roll Number">
                </div>

                <label>Password</label>
                <div class="input-box">
                    <i class="fa fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter Password">
                    <i class="fa fa-eye toggle" onclick="togglePassword()"></i>
                </div>

                <div class="row">
                    <label><input type="checkbox"> Remember Me</label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button onclick="login()">Login</button>
                <p id="msg"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
